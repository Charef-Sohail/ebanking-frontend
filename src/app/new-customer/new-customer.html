<div class="container">
  <div class="card col-md-6 offset-3 mt-2">
    <div class="card-header">New Customer</div>
    <div class="card-body">
      <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleSaveCustomer()">
        <!-- Name Field -->
        <div class="mb-3">
          <label class="form-label">Name:</label>
          <input type="text" formControlName="name" class="form-control">

          @if (newCustomerFormGroup.get('name')?.touched && newCustomerFormGroup.get('name')?.hasError('required')) {
            <span class="text-danger">Name is Required</span>
          }
        </div>

        <!-- Email Field -->
        <div class="mb-3">
          <label class="form-label">Email:</label>
          <input type="text" formControlName="email" class="form-control">

          @if (newCustomerFormGroup.get('email')?.touched && newCustomerFormGroup.get('email')?.hasError('required')) {
            <span class="text-danger">Email is Required</span>
          }
        </div>

        <!-- Submit Button -->
        <button [disabled]="!newCustomerFormGroup.valid" class="btn btn-info">Save</button>
      </form>
    </div>
  </div>

</div>
